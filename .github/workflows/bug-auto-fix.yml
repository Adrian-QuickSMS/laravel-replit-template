name: Bug Auto-Fix (Claude Code)

# Triggers when an issue is labelled 'auto-fix' (created by the bug report widget)
on:
  issues:
    types: [labeled]

jobs:
  auto-fix:
    if: github.event.label.name == 'auto-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract bug reference
        id: extract-ref
        run: |
          # Parse BUG-XXXXXXXX-XXXXXX reference from issue body
          REF=$(echo "${{ github.event.issue.body }}" | grep -oP 'BUG-\d{8}-[A-Za-z0-9]{6}' | head -1)
          echo "reference=$REF" >> $GITHUB_OUTPUT
          echo "Bug reference: $REF"

      - name: Notify HubSpot — Fix Started
        if: steps.extract-ref.outputs.reference != ''
        run: |
          curl -s -X POST "${{ vars.APP_URL }}/api/webhooks/bug-fix-status" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{"event":"fix_started","reference":"${{ steps.extract-ref.outputs.reference }}","message":"Claude Code is analysing the bug report."}' | openssl dgst -sha256 -hmac '${{ secrets.BUG_FIX_WEBHOOK_SECRET }}' | awk '{print $2}')" \
            -d '{"event":"fix_started","reference":"${{ steps.extract-ref.outputs.reference }}","message":"Claude Code is analysing the bug report."}'
        continue-on-error: true

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          prompt: |
            You are fixing a bug reported by a user in the QuickSMS portal.

            Read the CLAUDE.md file first to understand the project structure and guardrails.

            Here is the bug report:

            ---
            ${{ github.event.issue.body }}
            ---

            Instructions:
            1. Analyse the bug report carefully — pay attention to the page URL, product area, description, and console logs
            2. Find the relevant source files based on the product area and page URL
            3. Identify the root cause
            4. Implement a minimal, targeted fix — do NOT refactor unrelated code
            5. Follow all CLAUDE.md guardrails (no new frameworks, no migration changes, etc.)
            6. If you cannot confidently fix the bug, explain why in a comment on the issue instead

            Create a fix branch and commit your changes.
          allowed_tools: "Bash,Read,Edit,Write,Glob,Grep"
          direct_prompt: true

      - name: Create Pull Request
        if: success()
        id: create-pr
        run: |
          BRANCH="auto-fix/${{ steps.extract-ref.outputs.reference }}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "[Auto-Fix] ${{ github.event.issue.title }}" \
            --body "## Automated Bug Fix

          **Bug Report:** #${{ github.event.issue.number }}
          **Reference:** \`${{ steps.extract-ref.outputs.reference }}\`

          This PR was automatically generated by Claude Code in response to a portal bug report.

          **Please review carefully before merging.**

          ---
          *Closes #${{ github.event.issue.number }}*" \
            --draft \
            --head "$BRANCH")

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          PR_NUM=$(echo "$PR_URL" | grep -oP '\d+$')
          echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify HubSpot — PR Opened
        if: steps.create-pr.outputs.pr_url != ''
        run: |
          PAYLOAD='{"event":"pr_opened","reference":"${{ steps.extract-ref.outputs.reference }}","pr_url":"${{ steps.create-pr.outputs.pr_url }}","pr_number":${{ steps.create-pr.outputs.pr_number }},"message":"Draft PR created for review."}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac '${{ secrets.BUG_FIX_WEBHOOK_SECRET }}' | awk '{print $2}')
          curl -s -X POST "${{ vars.APP_URL }}/api/webhooks/bug-fix-status" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD"
        continue-on-error: true

      - name: Comment on issue
        if: steps.create-pr.outputs.pr_url != ''
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "Claude Code has created a draft PR with a proposed fix: ${{ steps.create-pr.outputs.pr_url }}

          Please review the changes before merging."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # PR merge notification is handled by .github/workflows/bug-fix-merged.yml
