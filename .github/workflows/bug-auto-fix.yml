name: Bug Auto-Fix (Claude Code)

# Triggers when an issue is labelled 'auto-fix' (created by the bug report widget)
on:
  issues:
    types: [labeled]

jobs:
  auto-fix:
    if: github.event.label.name == 'auto-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract bug reference
        id: extract-ref
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Parse BUG-XXXXXXXX-XXXXXX reference from issue body (safe — no interpolation)
          REF=$(echo "$ISSUE_BODY" | grep -oP 'BUG-\d{8}-[A-Za-z0-9]{6}' | head -1)
          echo "reference=$REF" >> $GITHUB_OUTPUT
          echo "Bug reference: $REF"

      - name: Notify HubSpot — Fix Started
        if: steps.extract-ref.outputs.reference != ''
        env:
          WEBHOOK_URL: ${{ vars.APP_URL }}/api/webhooks/bug-fix-status
          WEBHOOK_SECRET: ${{ secrets.BUG_FIX_WEBHOOK_SECRET }}
          BUG_REF: ${{ steps.extract-ref.outputs.reference }}
        run: |
          PAYLOAD="{\"event\":\"fix_started\",\"reference\":\"${BUG_REF}\",\"message\":\"Claude Code is analysing the bug report.\"}"
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD"
        continue-on-error: true

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          prompt: |
            You are fixing a bug reported by a user in the QuickSMS portal.

            Read the CLAUDE.md file first to understand the project structure and guardrails.

            Here is the bug report:

            ---
            ${{ github.event.issue.body }}
            ---

            Instructions:
            1. Analyse the bug report carefully — pay attention to the page URL, product area, description, and console logs
            2. Find the relevant source files based on the product area and page URL
            3. Identify the root cause
            4. Implement a minimal, targeted fix — do NOT refactor unrelated code
            5. Follow all CLAUDE.md guardrails (no new frameworks, no migration changes, etc.)
            6. If you cannot confidently fix the bug, explain why in a comment on the issue instead

            Create a fix branch named auto-fix/${{ steps.extract-ref.outputs.reference }} and commit your changes to it.
          allowed_tools: "Bash,Read,Edit,Write,Glob,Grep"
          direct_prompt: true

      - name: Check for changes and create PR
        if: success()
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUG_REF: ${{ steps.extract-ref.outputs.reference }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH="auto-fix/${BUG_REF}"

          # Check if Claude Code made any commits
          if [ -z "$(git diff HEAD --name-only)" ] && [ -z "$(git log --oneline origin/main..HEAD 2>/dev/null)" ]; then
            echo "No changes detected — Claude Code may not have been able to fix the bug"
            echo "pr_url=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Create branch from current state (includes Claude's commits)
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          git push -u origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "[Auto-Fix] ${ISSUE_TITLE}" \
            --body "## Automated Bug Fix

          **Bug Report:** #${ISSUE_NUMBER}
          **Reference:** \`${BUG_REF}\`

          This PR was automatically generated by Claude Code in response to a portal bug report.

          **Please review carefully before merging.**

          ---
          *Closes #${ISSUE_NUMBER}*" \
            --draft \
            --head "$BRANCH")

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          PR_NUM=$(echo "$PR_URL" | grep -oP '\d+$')
          echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT

      - name: Notify HubSpot — PR Opened
        if: steps.create-pr.outputs.pr_url != ''
        env:
          WEBHOOK_URL: ${{ vars.APP_URL }}/api/webhooks/bug-fix-status
          WEBHOOK_SECRET: ${{ secrets.BUG_FIX_WEBHOOK_SECRET }}
          BUG_REF: ${{ steps.extract-ref.outputs.reference }}
          PR_URL: ${{ steps.create-pr.outputs.pr_url }}
          PR_NUM: ${{ steps.create-pr.outputs.pr_number }}
        run: |
          PAYLOAD="{\"event\":\"pr_opened\",\"reference\":\"${BUG_REF}\",\"pr_url\":\"${PR_URL}\",\"pr_number\":${PR_NUM:-0},\"message\":\"Draft PR created for review.\"}"
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD"
        continue-on-error: true

      - name: Comment on issue
        if: steps.create-pr.outputs.pr_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "Claude Code has created a draft PR with a proposed fix: ${{ steps.create-pr.outputs.pr_url }}

          Please review the changes before merging."
